name: dart_format
copyright: "2022-2026 Mark Eggenstein"
description: A formatter for Dart. Like dartfmt. But better ;) Because it's configurable.
homepage: https://github.com/eggnstone/dart_format
version: 2.2.0
topics:
  - code-style
  - formatting

environment:
  sdk: ^3.10.0

executables:
  dart_format:
  dartformat: dart_format

dependencies:
  analyzer: ^12.1.0
  args: ^2.7.0
  freezed_annotation: ^3.1.0
  eggnstone_dart: ^1.4.3
  glob: ^2.1.3
  http: ^1.6.0
  intl: ^0.20.2
  json_annotation: ^4.12.0
  mime: ^2.0.0

dev_dependencies:
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  meta: ^1.18.2
  test: any

dependency_overrides:
  #
